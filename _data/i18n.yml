# ============================================================
# TEXTO DA HOME (parte mais editada do site)
# ============================================================
# Pode usar HTML inline:
#   <em>palavra em italic destacado</em>  →  italic colorido
#   <br>                                  →  quebra de linha

home_kicker:
  pt-br: "Caderno de processo"
  en: "Process journal"
  ja: "制作ノート"

home_headline:
  pt-br: |
    Notas, ensaios e <em>making-ofs</em><br>
    de um cineasta em formação.
  en: |
    Notes, essays, and <em>making-ofs</em><br>
    from a filmmaker in the making.
  ja: |
    映画づくりを学ぶ者の<br>
    制作ノート、エッセイ、<em>メイキング</em>。

home_intro:
  pt-br: |
    Este é meu espaço pessoal — onde registro o processo de criação dos meus filmes,
    ensaios sobre cinema e animação, e o que mais aparecer pelo caminho.
  en: |
    This is my personal space — where I record the process behind my films,
    essays on cinema and animation, and whatever else shows up along the way.
  ja: |
    ここは、自作映画の制作過程、映画とアニメーションについてのエッセイ、
    そして道すがら出会うものを書き留めるための場所です。


