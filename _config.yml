title: Pedro / Sanseki
email: ""
description: >-
  Arquivo pessoal vivo de Pedro / Sanseki: notas públicas, ensaios, projetos,
  referências e páginas em crescimento contínuo.
url: "https://sanseki3.github.io"
baseurl: ""
lang: "pt-BR"
timezone: America/Sao_Paulo
markdown: kramdown
kramdown:
  input: GFM
permalink: pretty

collections:
  notes:
    output: true
    permalink: /notes/:name/
  essays:
    output: true
    permalink: /essays/:name/
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: notes
    values:
      layout: note
      kind: note
      status: seed
      finished: false
  - scope:
      path: ""
      type: essays
    values:
      layout: essay
      kind: essay
      status: stable
      finished: false
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      kind: project

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
