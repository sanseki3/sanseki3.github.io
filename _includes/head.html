{%- assign current_lang = page.lang | default: site.default_lang | default: "en" -%}
<!DOCTYPE html>
<html lang="{{ current_lang }}" data-theme="night">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- comment -%} Setar tema imediatamente para evitar flash de conteúdo. {%- endcomment -%}
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'day' || saved === 'night') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch(e) {}
    })();
  </script>

  {%- seo -%}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  {%- if page.translations -%}
    {%- for translation in page.translations -%}
      <link rel="alternate" hreflang="{{ translation[0] }}" href="{{ translation[1] | absolute_url }}">
    {%- endfor -%}
  {%- endif -%}

  <!-- Tipografia: Cormorant Garamond (display), Newsreader (body), JetBrains Mono (meta), Noto Serif JP (japonês) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
